name: OuraClaw Daily Report

on:
  schedule:
    - cron: '0 8 * * *' # Gira ogni mattina alle 08:00 UTC
  workflow_dispatch: # Permette di avviarlo a mano per testare

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run OuraClaw and Send to Telegram
        env:
          OURA_PERSONAL_ACCESS_TOKEN: ${{ secrets.OURA_PERSONAL_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Esegue lo script e salva l'output in una variabile
          REPORT=$(python main.py)
          
          # Invia l'output a Telegram via API
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$REPORT" \
            -d parse_mode="Markdown"
