name: OuraClaw Daily Report

on:
  schedule:
    - cron: '0 8 * * *' 
  workflow_dispatch:

jobs:
  report:
    runs-on: macos-latest # Obbligatorio per far girare Swift velocemente
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run OuraClaw
        env:
          OURA_ACCESS_TOKEN: ${{ secrets.OURA_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Compila ed esegue il programma Swift
          # Salviamo l'output in un file per sicurezza
          swift run OuraClaw > report.txt
          
      - name: Send to Telegram
        run: |
          REPORT=$(cat report.txt)
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$REPORT"
