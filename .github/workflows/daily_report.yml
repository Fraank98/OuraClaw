name: OuraClaw Daily Report

on:
  schedule:
    - cron: '0 8 * * *' 
  workflow_dispatch:

jobs:
  report:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Versione aggiornata

      - name: Run OuraClaw
        env:
          OURA_ACCESS_TOKEN: ${{ secrets.OURA_ACCESS_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # 1. Vediamo dove siamo e cosa c'è dentro
          ls -R
          
          # 2. Proviamo a entrare nella cartella se esiste, altrimenti resta qui
          if [ -d "OuraClaw" ]; then cd OuraClaw; fi
          
          # 3. Eseguiamo Swift
          swift run OuraClaw > ../report.txt
          
      - name: Send to Telegram
        run: |
          REPORT=$(cat report.txt)
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="$REPORT"
